name: Build and Deploy Schema Browser

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone lutaml-xsd
        run: |
          git clone --depth 1 https://github.com/lutaml/lutaml-xsd.git
          git clone --depth 1 https://github.com/lutaml/lutaml-model.git

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0
          working-directory: lutaml-xsd

      - name: Install dependencies
        run: |
          cd lutaml-xsd
          bundle install

      - name: Build LXR package
        run: |
          cd lutaml-xsd
          bundle exec ruby exe/lutaml-xsd build from-config ${{ github.workspace }}/config.yml --output ${{ github.workspace }}/urban_function.lxr

      - name: Generate SPA documentation
        run: |
          cd lutaml-xsd
          bundle exec ruby exe/lutaml-xsd doc spa ${{ github.workspace }}/urban_function.lxr --mode vue_inlined --output ${{ github.workspace }}/urban_function_docs.html

      - name: Prepare artifact
        run: |
          mkdir -p ${{ github.workspace }}/_site
          cp ${{ github.workspace }}/urban_function_docs.html ${{ github.workspace }}/_site/index.html
          cp -r ${{ github.workspace }}/images ${{ github.workspace }}/_site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ github.workspace }}/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
